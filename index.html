<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDU 任务制抢座助手</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --text: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: radial-gradient(circle at top right, #1e1b4b, var(--bg)); color: var(--text); margin: 0; min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
        
        .container { width: 100%; max-width: 1200px; display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        
        .panel { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .section-title { font-size: 0.75rem; text-transform: uppercase; color: var(--primary); margin: 15px 0 10px; letter-spacing: 1px; }
        
        input, select { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px; color: white; margin-bottom: 10px; }
        label { font-size: 0.7rem; opacity: 0.5; margin-bottom: 5px; display: block; }

        .btn { border: none; border-radius: 10px; padding: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; display: block; text-align: center; text-decoration: none; }
        .btn-add { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-quick { background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3); }
        .btn-now { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .task-list { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .task-card { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        /* 状态颜色 */
        .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 5px; font-weight: 600; color: white; }
        .badge-waiting { background: #6366f1; }
        .badge-warming { background: #f59e0b; }
        .badge-ready { background: #3b82f6; }
        .badge-snatching { background: #ec4899; }
        .badge-completed { background: #4ade80; }
        .badge-failed { background: #f87171; }

        .task-delete { color: #f87171; cursor: pointer; font-size: 0.8rem; border: 1px solid #f87171; padding: 2px 6px; border-radius: 4px; }

        .terminal { background: #000; border-radius: 15px; padding: 15px; font-family: monospace; font-size: 0.8rem; height: 320px; overflow-y: auto; margin-top: 20px; border: 1px solid #334155; }
        .log-line { margin-bottom: 4px; }
        .log-time { color: #64748b; }
        .log-info { color: #fff; }
        .log-success { color: #4ade80; }
        .log-error { color: #f87171; }
        .log-warn { color: #fbbf24; }
        .sub-text { font-size: 0.7rem; color: #64748b; text-align: center; margin-top: 5px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel">
            <h3 style="margin:0">任务管理</h3>
            <div class="section-title">通行证</div>
            <input type="text" id="username" placeholder="学号">
            <input type="password" id="password" placeholder="密码">
            
            <div class="section-title">抢占目标</div>
            <select id="floor">
                <option value="宋韵云图（四楼）">宋韵云图（四楼）</option>
                <option value="格物E堂（二楼东）">格物E堂（二楼东）</option>
            </select>
            <input type="text" id="seatRange" placeholder="座位范围 (如 17-58)">
            
            <div class="section-title">计划</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label>预约日期</label>
                    <select id="dateOffset">
                        <option value="0">今天</option>
                        <option value="1">明天</option>
                        <option value="2" selected>后天</option>
                    </select>
                </div>
                <div>
                    <label>触发时刻</label>
                    <input type="text" id="triggerTime" value="20:00:00">
                </div>
            </div>
            
            <button class="btn btn-add" id="btnAdd" onclick="addTask()">加入任务清单</button>
            <button class="btn btn-quick" onclick="addQuickTask()">📌 添加每日固定任务</button>
            <span class="sub-text">使用上方账号，每天20:00抢后天四楼17-58号座位</span>
            <button class="btn btn-now" id="btnNow" onclick="bookNow()">立即强制捡漏</button>
            
            <div class="terminal" id="logContainer"></div>
        </div>

        <div class="panel">
            <h3 style="margin:0 0 20px 0">当前任务看板</h3>
            <div class="task-list" id="taskList"></div>
        </div>
    </div>

    <script>
        // 缓存
        ['username', 'password', 'seatRange', 'triggerTime'].forEach(id => {
            const saved = localStorage.getItem('hdu_' + id);
            if(saved) document.getElementById(id).value = saved;
            document.getElementById(id).oninput = () => localStorage.setItem('hdu_' + id, document.getElementById(id).value);
        });

        function renderTasks(tasks) {
            const container = document.getElementById('taskList');
            if(tasks.length === 0) {
                container.innerHTML = '<div style="opacity:0.3; text-align:center; padding:50px;">暂无预约任务</div>';
                return;
            }
            container.innerHTML = tasks.map(t => `
                <div class="task-card">
                    <div class="task-header">
                        <div>
                            <span class="badge badge-${t.status.toLowerCase()}">${t.status.toUpperCase()}</span>
                            ${t.recurring ? ' 🔁' : ''}
                        </div>
                        <span class="task-delete" onclick="deleteTask('${t.id}')">删除</span>
                    </div>
                    <div class="task-info">
                        📍 场馆：${t.floor}<br>
                        🪑 座位：${t.seat_display || t.seats || '未知'}<br>
                        ⏱ 时间：${t.startTime || '09:00'} - ${t.endTime || '22:00'}<br>
                        ⏰ 触发：<b style="color:var(--secondary)">${t.triggerTime}</b> | 预约：${t.dateOffset == 0 ? '今天' : t.dateOffset == 1 ? '明天' : '后天'}
                        ${t.preferred_seat ? `<br><span style="color:#4ade80; font-size:0.75rem">✨ 已锁定首选：${t.preferred_seat}号</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function validateInputs() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const s = document.getElementById('seatRange').value;
            if(!u || !p || !s) {
                alert("请填写完整：学号、密码和座位范围！");
                return false;
            }
            return true;
        }

        async function addTask() {
            if(!validateInputs()) return;
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                floor: document.getElementById('floor').value,
                seatRange: document.getElementById('seatRange').value,
                dateOffset: parseInt(document.getElementById('dateOffset').value),
                triggerTime: document.getElementById('triggerTime').value,
                startTime: "09:00",
                endTime: "22:00",
                recurring: false
            };
            await fetch('/add_task', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const btn = document.getElementById('btnAdd');
            const oldText = btn.innerText;
            btn.innerText = "✅ 已添加";
            setTimeout(() => btn.innerText = oldText, 1500);
            
            fetchTasks();
        }

        async function addQuickTask() {
            if(!validateInputs()) return;
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                floor: "宋韵云图（四楼）",
                seatRange: "17-58",
                startTime: "09:00",
                endTime: "22:00",
                dateOffset: 2,
                triggerTime: "20:00:00",
                recurring: true
            };
            await fetch('/add_task', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            fetchTasks();
        }

        async function deleteTask(id) {
            await fetch(`/delete_task/${id}`, { method: 'POST' });
            fetchTasks();
        }

        async function bookNow() {
            if(!validateInputs()) return;
            const btn = document.getElementById('btnNow');
            btn.disabled = true;
            setTimeout(() => btn.disabled = false, 5000);

            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                floor: document.getElementById('floor').value,
                seatRange: document.getElementById('seatRange').value,
                dateOffset: parseInt(document.getElementById('dateOffset').value),
                triggerTime: document.getElementById('triggerTime').value,
                startTime: "09:00",
                endTime: "22:00"
            };
            await fetch('/book_now', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        }

        let lastLogIndex = 0;
        let lastTaskHash = "";

        async function fetchTasks() {
            try {
                const resp = await fetch('/tasks');
                const tasks = await resp.json();
                
                // 性能优化：只有数据变动时才重绘 DOM
                const currentHash = JSON.stringify(tasks);
                if (currentHash !== lastTaskHash) {
                    renderTasks(tasks || []);
                    lastTaskHash = currentHash;
                }
            } catch(e) {}
        }

        setInterval(async () => {
            try {
                const resp = await fetch(`/get_logs?last_index=${lastLogIndex}`);
                const data = await resp.json();
                const container = document.getElementById('logContainer');
                
                if (data.logs && data.logs.length > 0) {
                    const fragment = document.createDocumentFragment();
                    data.logs.forEach(l => {
                        let msg = l.msg;
                        if (msg.trim().startsWith('{')) {
                            try {
                                const obj = JSON.parse(msg);
                                msg = obj.MESSAGE || obj.msg || msg;
                            } catch(e) {}
                        }
                        const div = document.createElement('div');
                        div.className = 'log-line';
                        div.innerHTML = `<span class="log-time">[${l.time}]</span> <span class="log-${l.level}">${msg}</span>`;
                        fragment.appendChild(div);
                    });
                    container.appendChild(fragment);
                    lastLogIndex = data.last_index;
                    container.scrollTop = container.scrollHeight;
                }
            } catch(e) {}
        }, 1500); // 降低对数轮询频率至 1.5s

        setInterval(fetchTasks, 5000); // 任务列表轮询降至 5s
        fetchTasks();
    </script>
</body>
</html>
